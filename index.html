<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cartoon Demo — AnimeGANv2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 상태 표시 -->
        <div id="status" class="status">초기화 중...</div>

        <!-- 모델 안내 -->
        <div class="model-info">
            <span class="badge">AnimeGANv2</span>
            <span class="model-desc">얼굴을 애니메 캐릭터로 변환</span>
        </div>

        <!-- 이미지 영역 -->
        <div class="image-area">
            <div class="image-slot">
                <div class="label">원본</div>
                <img id="original" alt="">
            </div>
            <div class="image-slot">
                <div class="label">카툰</div>
                <div class="cartoon-wrap">
                    <img id="cartoon" alt="">
                    <div id="loading" class="loading hidden">
                        <div class="spinner"></div>
                        <div class="loading-text">AI 처리 중...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 브라우저 직접 테스트용 -->
        <div class="dev-controls" id="devControls">
            <input type="file" id="fileInput" accept="image/*">
            <label for="fileInput" class="dev-btn">사진 선택 (개발용)</label>
        </div>
    </div>

    <!-- ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
    <script src="cartoonize.js"></script>
</body>
</html>
