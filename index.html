<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cartoon Demo — AnimeGANv2 (4 Styles)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 상태 표시 -->
        <div id="status" class="status">초기화 중...</div>

        <!-- 스타일 선택 -->
        <div class="style-picker" id="stylePicker">
            <button class="style-btn active" data-style="celeba_distill">
                <span class="style-name">부드러움</span>
                <span class="style-desc">CelebA · 성별 유지 우수</span>
            </button>
            <button class="style-btn" data-style="face_paint_512_v1">
                <span class="style-name">애니 v1</span>
                <span class="style-desc">클래식 애니메</span>
            </button>
            <button class="style-btn" data-style="face_paint_512_v2">
                <span class="style-name">애니 v2</span>
                <span class="style-desc">강한 애니메</span>
            </button>
            <button class="style-btn" data-style="paprika">
                <span class="style-name">파프리카</span>
                <span class="style-desc">콘 사토시 몽환</span>
            </button>
        </div>

        <!-- 이미지 영역 -->
        <div class="image-area">
            <div class="image-slot">
                <div class="label">원본</div>
                <img id="original" alt="">
            </div>
            <div class="image-slot">
                <div class="label">카툰</div>
                <div class="cartoon-wrap">
                    <img id="cartoon" alt="">
                    <div id="loading" class="loading hidden">
                        <div class="spinner"></div>
                        <div class="loading-text">AI 처리 중...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 브라우저 직접 테스트용 -->
        <div class="dev-controls" id="devControls">
            <input type="file" id="fileInput" accept="image/*">
            <label for="fileInput" class="dev-btn">사진 선택 (개발용)</label>
        </div>
    </div>

    <!-- ONNX Runtime Web -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.17.1/dist/ort.min.js"></script>
    <script src="cartoonize.js"></script>
</body>
</html>
