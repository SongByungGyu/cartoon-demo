<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cartoon Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 상태 표시 -->
        <div id="status" class="status">모델 준비 중...</div>

        <!-- 스타일 선택 -->
        <div class="style-picker" id="stylePicker">
            <button class="style-btn active" data-style="hayao">미야자키</button>
            <button class="style-btn" data-style="shinkai">신카이</button>
            <button class="style-btn" data-style="hosoda">호소다</button>
            <button class="style-btn" data-style="paprika">파프리카</button>
        </div>

        <!-- 이미지 영역 -->
        <div class="image-area">
            <div class="image-slot">
                <div class="label">원본</div>
                <img id="original" alt="원본 이미지">
            </div>
            <div class="image-slot">
                <div class="label">카툰</div>
                <div class="cartoon-wrap">
                    <img id="cartoon" alt="카툰 결과">
                    <div id="loading" class="loading hidden">
                        <div class="spinner"></div>
                        <div class="loading-text">AI 처리 중...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 브라우저 직접 테스트용 -->
        <div class="dev-controls" id="devControls">
            <input type="file" id="fileInput" accept="image/*">
            <label for="fileInput" class="dev-btn">사진 선택 (개발용)</label>
        </div>
    </div>

    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <script src="cartoonize.js"></script>
</body>
</html>
